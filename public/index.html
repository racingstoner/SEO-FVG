<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FVG SEO Tools</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo">
                <i class="fas fa-chart-line"></i>
                <h2>FVG SEO</h2>
            </div>
            <nav>
                <ul id="tab-nav">
                    <li class="active" data-target="spreadsheet"><a href="#"><i class="fas fa-file-excel"></i> Spreadsheets</a></li>
                    <li data-target="dashboard"><a href="#"><i class="fas fa-tachometer-alt"></i> Dashboard</a></li>
                </ul>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="topbar">
                <h1 id="topbar-title">Status Sitemap</h1>
                <div class="user-profile">
                    <div class="avatar">SEO</div>
                </div>
            </header>

            <!-- SECTION: SPREADSHEETS -->
            <div id="tab-spreadsheet" class="tab-pane active">
                <section class="analyze-section">
                    <div class="input-group">
                        <input type="text" id="sheet-url" value="https://docs.google.com/spreadsheets/d/1oPzqJaragvYG82vKawnajhHD9BnArdDqMBVduCeW9eI" placeholder="URL del Google Spreadsheet">
                        <button id="analyze-btn" class="btn btn-primary"><i class="fas fa-cloud-download-alt"></i> Obtener URLs</button>
                    </div>
                    <div class="status-message" id="status-message">Ingresa la URL y haz clic en Analizar Links para comenzar.</div>
                </section>

                <!-- Dashboard Widgets -->
                <section class="dashboard-widgets" id="dashboard" style="display: none;">
                    <div class="widget">
                        <div class="widget-icon primary"><i class="fas fa-list-ol"></i></div>
                        <div class="widget-info">
                            <h3>Cantidad de URLs</h3>
                            <p id="total-urls">0</p>
                        </div>
                    </div>
                    <div class="widget">
                        <div class="widget-icon success"><i class="fas fa-clock"></i></div>
                        <div class="widget-info">
                            <h3>Última vez analizado</h3>
                             <div class="scroll-wrapper"><p id="last-updated">-</p></div>
                        </div>
                    </div>
                </section>

                <!-- Data Table -->
                <section class="table-section" id="table-container" style="display: none;">
                    <div class="table-header">
                        <h2>Detalles de URLs</h2>
                        <div class="table-actions">
                            <button class="btn btn-outline" id="export-csv"><i class="fas fa-download"></i> Exportar CSV</button>
                        </div>
                    </div>
                    <div class="table-wrapper">
                        <table id="urls-table">
                            <thead>
                                <tr>
                                    <th>N°</th>
                                    <th data-sort="url">URL <i class="fas fa-sort"></i></th>
                                </tr>
                            </thead>
                            <tbody id="table-body">
                                <!-- Rows injected by JS -->
                            </tbody>
                        </table>
                    </div>
                </section>
            </div>

            <!-- SECTION: DASHBOARD -->
            <div id="tab-dashboard" class="tab-pane" style="display: none;">
                <section class="table-section">
                    <h2>Dashboard Global</h2>
                    <p style="color: var(--text-sec); margin-top: 1rem;">Sección en construcción para métricas y gráficos visuales cruzados.</p>
                </section>
            </div>

        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
